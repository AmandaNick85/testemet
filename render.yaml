services:
  # AUTH SERVICE (criar primeiro — o analytics reutiliza o JWT_SECRET)
  - type: web
    name: medmetrics-auth-service
    runtime: node
    plan: free
    rootDir: auth-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

  # ANALYTICS SERVICE
  - type: web
    name: medmetrics-analytics-service
    runtime: docker
    plan: free
    rootDir: analytics-service
    healthCheckPath: /health

    envVars:
      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        fromService:
          type: web
          name: medmetrics-auth-service
          envVarKey: JWT_SECRET

  # FRONTEND (definir URLs com sufixo /api ao criar o Blueprint)
  - type: web
    name: medmetrics-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_AUTH_API_URL
        sync: false

      - key: VITE_ANALYTICS_API_URL
        sync: false
